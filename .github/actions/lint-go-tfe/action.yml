name: Lint & Test
description: Lints/tests go-tfe
runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true

    - run: make fmtcheck
      shell: bash

    - name: install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/6008b81b81c690c046ffc3fd5bce896da715d5fd/install.sh | sh -s -- -b $(go env GOPATH)/bin $GOLANGCILINT_VERSION
      shell: bash
      env:
        GOLANGCILINT_VERSION: v2.11.3

    - run: make lint
      shell: bash

    - run: make lint_v1
      shell: bash

    - name: get dependencies
      shell: bash
      run: |
        go mod download
        go mod tidy
        cd v2
        go mod download
        go mod tidy

    - name: verify no changes
      shell: bash
      run: git diff --exit-code

    - name: run tests
      shell: bash
      run: |
        make test

    - name: build v1
      shell: bash
      run: |
        go build .