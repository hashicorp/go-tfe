name: Merge Nightly API Update

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-latest:
    name: Merge Latest Nightly API PR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository && startsWith(github.event.workflow_run.head_branch, 'automation/nightly-api-update/')) }}
    env:
      BRANCH_PREFIX: automation/nightly-api-update/
      NIGHTLY_LABEL: nightly-api-update
      NIGHTLY_AUTHOR: github-actions[bot]
    steps:
      - name: Close older nightly PRs
        id: close_older_nightly_prs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const branchPrefix = process.env.BRANCH_PREFIX;
            const nightlyLabel = process.env.NIGHTLY_LABEL;
            const nightlyAuthor = process.env.NIGHTLY_AUTHOR;
            const { owner, repo } = context.repo;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });

            const nightlyPrs = prs.filter((pr) =>
              pr.head.ref.startsWith(branchPrefix) &&
              pr.head.repo.full_name === `${owner}/${repo}` &&
              pr.user.login === nightlyAuthor &&
              pr.labels.some((label) => label.name === nightlyLabel)
            );

            if (nightlyPrs.length === 0) {
              core.info('No open nightly API PRs found');
              return;
            }

            const [latestPr, ...olderPrs] = nightlyPrs;
            core.setOutput('latest_pr_number', String(latestPr.number));

            for (const pr of olderPrs) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: 'closed',
              });
            }

      - name: Merge latest nightly PR if checks passed
        if: ${{ steps.close_older_nightly_prs.outputs.latest_pr_number != '' }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            const latestPrNumber = Number('${{ steps.close_older_nightly_prs.outputs.latest_pr_number }}');
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    number
                    headRefName
                    headRepository {
                      nameWithOwner
                    }
                    mergeable
                    author {
                      login
                    }
                    labels(first: 20) {
                      nodes {
                        name
                      }
                    }
                    reviewDecision
                    statusCheckRollup {
                      state
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner,
              repo,
              number: latestPrNumber,
            });

            const pr = result.repository.pullRequest;

            if (pr.author?.login !== process.env.NIGHTLY_AUTHOR) {
              core.info(`Skipping merge for PR #${latestPrNumber}: author is ${pr.author?.login ?? 'unknown'}`);
              return;
            }

            if (pr.headRefName == null || !pr.headRefName.startsWith(process.env.BRANCH_PREFIX)) {
              core.info(`Skipping merge for PR #${latestPrNumber}: branch is ${pr.headRefName ?? 'unknown'}`);
              return;
            }

            if (pr.headRepository?.nameWithOwner !== `${owner}/${repo}`) {
              core.info(`Skipping merge for PR #${latestPrNumber}: head repository is ${pr.headRepository?.nameWithOwner ?? 'unknown'}`);
              return;
            }

            if (!pr.labels.nodes.some((label) => label.name === process.env.NIGHTLY_LABEL)) {
              core.info(`Skipping merge for PR #${latestPrNumber}: missing ${process.env.NIGHTLY_LABEL} label`);
              return;
            }

            if (pr.statusCheckRollup?.state !== 'SUCCESS') {
              core.info(`Skipping merge for PR #${latestPrNumber}: checks are ${pr.statusCheckRollup?.state ?? 'not available'}`);
              return;
            }

            if (pr.mergeable !== 'MERGEABLE') {
              core.info(`Skipping merge for PR #${latestPrNumber}: mergeable state is ${pr.mergeable}`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: latestPrNumber,
              merge_method: 'squash',
            });
